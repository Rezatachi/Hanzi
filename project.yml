name: MandarinDrift
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
settings:
  base:
    SWIFT_VERSION: "5.10"
    PRODUCT_BUNDLE_IDENTIFIER: com.example.$(PRODUCT_NAME:rfc1034identifier)
    DEVELOPMENT_TEAM: ""
packages:
  MandarinCore:
    path: Core
targets:
  MandarinDrift:
    type: application
    platform: iOS
    sources:
      - path: App
    resources:
      - path: App/Resources
    entitlements:
      path: App/MandarinDrift.entitlements
    dependencies:
      - package: MandarinCore
        product: MandarinCore
    settings:
      base:
        INFOPLIST_FILE: App/Info.plist
        TARGETED_DEVICE_FAMILY: 1
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        CODE_SIGN_ENTITLEMENTS: App/MandarinDrift.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  MandarinDriftWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: Widgets
    entitlements:
      path: Widgets/MandarinDriftWidgets.entitlements
    dependencies:
      - package: MandarinCore
        product: MandarinCore
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Mandarin Drift Widgets
        INFOPLIST_KEY_NSExtensionPointIdentifier: com.apple.widgetkit-extension
        INFOPLIST_KEY_NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).MandarinDriftWidgetsBundle
        CODE_SIGN_ENTITLEMENTS: Widgets/MandarinDriftWidgets.entitlements
  MandarinDriftTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/MandarinDriftTests
    dependencies:
      - target: MandarinDrift
      - package: MandarinCore
        product: MandarinCore
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
  MandarinDriftUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Tests/MandarinDriftUITests
    dependencies:
      - target: MandarinDrift
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
  WidgetTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/WidgetTests
    dependencies:
      - target: MandarinDriftWidgets
      - package: MandarinCore
        product: MandarinCore
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
schemes:
  MandarinDrift:
    build:
      targets:
        MandarinDrift: all
        MandarinDriftWidgets: [run, test]
        MandarinDriftTests: [test]
        MandarinDriftUITests: [test]
        WidgetTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - MandarinDriftTests
        - MandarinDriftUITests
        - WidgetTests
